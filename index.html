<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課程查詢系統 PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #f2f2f7; -webkit-tap-highlight-color: transparent; }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .font-rounded { font-family: ui-rounded, system-ui, -apple-system, sans-serif; }
        .course-code { 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 0.05em; 
            font-weight: 800;
        }
        select { -webkit-appearance: none; appearance: none; cursor: pointer; }
        @media (min-width: 768px) {
            .course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="max-w-4xl mx-auto p-4 md:p-10 pb-24">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black tracking-tight text-gray-900">課程查詢系統 <span class="text-blue-500 text-sm font-bold tracking-normal ml-1">PRO</span></h1>
            <button @click="resetAll" class="hidden md:flex items-center gap-2 px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl text-xs font-bold transition-all">
                <i class="fa-solid fa-arrow-rotate-left"></i> 重設全部
            </button>
        </div>

        <div class="ios-card p-6 mb-8 border border-white relative">
            <div class="flex bg-gray-200 p-1 rounded-2xl mb-6 max-w-sm mx-auto">
                <button v-for="l in levels" :key="l" @click="selectedLevel = l; resetSession()" 
                    :class="selectedLevel === l ? 'bg-white shadow-md text-black' : 'text-gray-500'"
                    class="flex-1 py-2 rounded-xl text-sm font-bold transition-all">
                    {{ l }}
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 border-b border-gray-100 pb-6">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <i class="fa-solid fa-magnifying-glass text-xs"></i>
                    </span>
                    <input v-model="searchQuery" type="text" placeholder="搜尋課程編號 (例如: IC26)..." 
                        class="w-full pl-10 pr-4 py-3 bg-gray-50 rounded-2xl text-sm font-semibold border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                </div>
                <div class="flex items-center justify-between md:justify-end gap-3 px-2">
                    <label class="text-xs font-bold text-gray-500 cursor-pointer select-none" for="pastToggle">
                        顯示今日以前的課程
                    </label>
                    <input type="checkbox" id="pastToggle" v-model="includePast" 
                        class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <div class="flex items-center gap-2 text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                        <i class="fa-solid fa-language text-blue-500 text-xs"></i> 語言
                    </div>
                    <select v-model="selectedLanguage" class="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                        <option v-for="opt in languages" :key="opt">{{ opt }}</option>
                    </select>
                </div>

                <div class="relative">
                    <div class="flex items-center justify-center gap-2 text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                        <i class="fa-solid fa-layer-group text-purple-500 text-xs"></i> 課程模式
                    </div>
                    <select v-model="selectedType" class="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold text-center border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                        <option v-for="type in courseTypes" :key="type">{{ type }}</option>
                    </select>
                    <div class="absolute right-6 top-[72%] -translate-y-1/2 pointer-events-none text-gray-300">
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
            </div>

            <div class="mt-6 pt-4 border-t border-gray-50">
                <div class="flex items-center justify-between text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                    <span>選擇堂數 (可多選)</span>
                    <button @click="toggleAllSessions" class="text-blue-500 hover:underline lowercase text-[11px] font-bold">全選 / 全不選</button>
                </div>
                <div class="flex flex-wrap gap-2 max-h-24 overflow-y-auto p-1 bg-gray-50 rounded-2xl">
                    <button v-for="n in sessionRange" :key="n" @click="toggleSession(n)"
                        :class="targetSessions.includes(n) ? 'bg-orange-500 text-white shadow-sm' : 'bg-white text-gray-600 hover:bg-gray-100'"
                        class="px-3 py-1.5 rounded-xl text-xs font-bold transition-all min-w-[55px]">
                        第 {{ n }} 堂
                    </button>
                </div>
            </div>
        </div>

        <div v-if="filteredCourses.length > 0" class="course-grid">
            <div v-for="group in filteredCourses" 
                 :key="group.id"
                 @click="copyFullGroup(group)"
                 class="ios-card p-6 mb-4 md:mb-0 hover:shadow-xl active:scale-[0.99] transition-all cursor-pointer border border-transparent hover:border-blue-200 group relative overflow-hidden">
                
                <div v-if="group.matchedSessions.length > 1" class="absolute left-0 top-0 bottom-0 w-1.5 bg-orange-500"></div>

                <div class="flex justify-between items-center mb-5">
                    <span class="course-code text-blue-600 text-base">{{ group.code }}</span>
                    <span :class="getTypeStyle(group.type)" class="text-[9px] px-2.5 py-1 rounded-lg font-black uppercase tracking-tighter">
                        {{ group.type }}
                    </span>
                </div>

                <div class="flex justify-between items-end">
                    <div class="flex-1 pr-4">
                        <div class="text-xl md:text-2xl font-black font-rounded tracking-tight" :class="isToday(group.date) ? 'text-red-500' : 'text-gray-800'">
                            {{ group.date }} <span class="text-sm md:text-base font-bold text-gray-500 ml-1">({{ getWeekdayLabel(group.date) }})</span>
                        </div>
                        
                        <div class="flex flex-wrap gap-1.5 mt-3">
                            <button v-for="s in group.matchedSessions" 
                                    :key="s.num" 
                                    @click.stop="copySingleSession(group, s)"
                                    class="bg-gray-100 hover:bg-blue-600 hover:text-white text-gray-700 text-[10px] px-2.5 py-1 rounded-xl font-bold transition-all flex items-center gap-1 group/btn border border-gray-200/50">
                                <span>第 {{ s.num }} 堂 ({{ s.time }})</span>
                                <i class="fa-regular fa-copy text-[9px] opacity-40 group-hover/btn:opacity-100"></i>
                            </button>
                        </div>
                        <div class="text-[11px] text-gray-400 font-bold mt-3 tracking-wide uppercase italic">{{ group.language }}</div>
                    </div>
                    
                    <div class="text-right min-w-[90px] self-end mb-1">
                        <div v-if="isToday(group.date)" class="text-[9px] font-black text-red-500 mb-1 animate-bounce">TODAY</div>
                        <div v-if="group.matchedSessions.length > 1" class="text-[9px] font-black text-orange-500 tracking-tight uppercase">
                            <i class="fa-solid fa-bolt"></i> 點堂數單複製
                        </div>
                        <div v-else class="text-[9px] font-bold text-gray-400 tracking-tight uppercase">
                            點卡片複製
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div v-else class="text-center py-32">
            <div class="bg-gray-100 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-12">
                <i class="fa-solid fa-calendar-xmark text-gray-300 text-2xl"></i>
            </div>
            <p class="text-gray-400 font-bold text-sm">沒有符合條件的課程</p>
            <button @click="resetAll" class="mt-4 text-blue-500 font-bold text-xs hover:underline">RESET ALL</button>
        </div>

        <button @click="resetAll" class="md:hidden fixed bottom-8 right-8 bg-black text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-50">
            <i class="fa-solid fa-arrow-rotate-left"></i>
        </button>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const allCourses = ref([]);
                const selectedLevel = ref('Level 2');
                const selectedLanguage = ref('All');
                const selectedType = ref('All');
                const targetSessions = ref([1]);
                const searchQuery = ref('');
                const includePast = ref(false);

                const levels = ['Level 2', 'Level 3'];
                const languages = ['All', 'English', 'Mandarin', 'Cantonese'];
                const courseTypes = ['All', 'Weekday Evening', 'Weekend Intensive', 'Weekday Daytime', 'Consecutive'];

                const sessionRange = computed(() => {
                    const max = selectedLevel.value === 'Level 2' ? 8 : 18;
                    return Array.from({length: max}, (_, i) => i + 1);
                });

                const loadData = async () => {
                    try {
                        const res = await fetch('courses.csv');
                        const text = await res.text();
                        const rows = text.replace(/\r/g, '').split('\n').filter(r => r.trim() !== '').slice(1);
                        
                        allCourses.value = rows.map(row => {
                            const cols = row.split(',').map(c => c.trim());
                            const sessions = [];
                            for (let i = 4; i < cols.length; i += 2) {
                                if (cols[i]) {
                                    sessions.push({ num: sessions.length + 1, date: cols[i], time: cols[i+1] || '' });
                                }
                            }
                            return { code: cols[0], type: cols[1], language: cols[2], level: cols[3], sessions };
                        });
                    } catch (e) { console.error("CSV 載入失敗：", e); }
                };

                const parseDate = (dateStr) => {
                    if (!dateStr) return new Date(8640000000000000);
                    const parts = dateStr.split('/');
                    if (parts.length !== 3) return new Date(8640000000000000); 
                    const [d, m, y] = parts.map(Number);
                    return new Date(y, m - 1, d);
                };

                const getWeekdayLabel = (dateStr) => {
                    const d = parseDate(dateStr);
                    const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                    return weekdays[d.getDay()] || '';
                };

                const filteredCourses = computed(() => {
                    const today = new Date();
                    today.setHours(0,0,0,0);

                    const groupsMap = new Map();

                    allCourses.value.forEach(c => {
                        if (c.level !== selectedLevel.value) return;
                        if (selectedLanguage.value !== 'All' && c.language !== selectedLanguage.value) return;
                        if (selectedType.value !== 'All' && c.type !== selectedType.value) return;
                        if (searchQuery.value.trim() && !c.code.toLowerCase().includes(searchQuery.value.toLowerCase().trim())) return;

                        c.sessions.forEach(s => {
                            if (targetSessions.value.includes(s.num)) {
                                if (!includePast.value) {
                                    const sDate = parseDate(s.date);
                                    if (sDate < today) return;
                                }

                                const key = `${c.code}_${s.date}`;
                                
                                if (!groupsMap.has(key)) {
                                    groupsMap.set(key, {
                                        id: key,
                                        code: c.code,
                                        type: c.type,
                                        language: c.language,
                                        date: s.date,
                                        matchedSessions: []
                                    });
                                }
                                groupsMap.get(key).matchedSessions.push(s);
                            }
                        });
                    });

                    const result = Array.from(groupsMap.values()).map(g => {
                        g.matchedSessions.sort((a, b) => a.num - b.num);
                        return g;
                    });

                    return result.sort((a, b) => parseDate(a.date) - parseDate(b.date));
                });

                const getTypeStyle = (type) => {
                    const styles = {
                        'Weekday Evening': 'bg-blue-50 text-blue-600 border border-blue-100',
                        'Weekend Intensive': 'bg-orange-50 text-orange-600 border border-orange-100',
                        'Weekday Daytime': 'bg-green-50 text-green-600 border border-green-100',
                        'Consecutive': 'bg-purple-50 text-purple-600 border border-purple-100'
                    };
                    return styles[type] || 'bg-gray-50 text-gray-500 border border-gray-100';
                };

                const isToday = (dateStr) => {
                    const sessionDate = parseDate(dateStr);
                    const today = new Date();
                    return sessionDate.getDate() === today.getDate() &&
                           sessionDate.getMonth() === today.getMonth() &&
                           sessionDate.getFullYear() === today.getFullYear();
                };

                // 彈出 Toast 提示
                const showToast = (msg) => {
                    const toast = document.createElement('div');
                    toast.innerText = msg;
                    toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-sm text-white px-5 py-2.5 rounded-full font-bold text-xs z-[100] shadow-xl tracking-wider transition-all animate-bounce";
                    document.body.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => toast.remove(), 300);
                    }, 1200);
                };

                // 情況一：點擊整張卡片，複製當日全部選中的堂數
                const copyFullGroup = (group) => {
                    const dayLabel = getWeekdayLabel(group.date);
                    let sessionDetails = '';
                    
                    if (group.matchedSessions.length === 1) {
                        const s = group.matchedSessions[0];
                        sessionDetails = `Session : 第 ${s.num} 堂\nDate：${group.date} (${dayLabel}) (${s.time})`;
                    } else {
                        sessionDetails = `Date：${group.date} (${dayLabel})\nSessions (一日共 ${group.matchedSessions.length} 堂)：\n` + 
                            group.matchedSessions.map(s => `  • 第 ${s.num} 堂：${s.time}`).join('\n');
                    }

                    const text = `【Course Code】${group.code}\nCourse Type：${group.type}\nLanguage：${group.language}\n${sessionDetails}`;
                    
                    navigator.clipboard.writeText(text).then(() => {
                        showToast(`已複製 ${group.code} 當日全部堂數!`);
                    });
                };

                // 情況二：單獨點擊卡片內的某個堂數按鈕，只複製那一堂
                const copySingleSession = (group, session) => {
                    const dayLabel = getWeekdayLabel(group.date);
                    const text = `【Course Code】${group.code}\nCourse Type：${group.type}\nLanguage：${group.language}\nSession : 第 ${session.num} 堂\nDate：${group.date} (${dayLabel}) (${session.time})`;
                    
                    navigator.clipboard.writeText(text).then(() => {
                        showToast(`已複製 ${group.code} (第 ${session.num} 堂)`);
                    });
                };

                const toggleSession = (n) => {
                    const index = targetSessions.value.indexOf(n);
                    if (index > -1) {
                        if (targetSessions.value.length > 1) {
                            targetSessions.value.splice(index, 1);
                        }
                    } else {
                        targetSessions.value.push(n);
                    }
                };

                const toggleAllSessions = () => {
                    if (targetSessions.value.length === sessionRange.value.length) {
                        targetSessions.value = [1];
                    } else {
                        targetSessions.value = [...sessionRange.value];
                    }
                };

                const resetAll = () => {
                    selectedLanguage.value = 'All';
                    selectedType.value = 'All';
                    targetSessions.value = [1];
                    searchQuery.value = '';
                    includePast.value = false;
                };

                const resetSession = () => { targetSessions.value = [1]; };

                onMounted(loadData);

                return { 
                    levels, selectedLevel, languages, selectedLanguage, 
                    courseTypes, selectedType, targetSessions, sessionRange, 
                    filteredCourses, searchQuery, includePast, 
                    getTypeStyle, isToday, copyFullGroup, copySingleSession, resetAll, resetSession,
                    getWeekdayLabel, toggleSession, toggleAllSessions
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
