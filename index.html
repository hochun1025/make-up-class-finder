<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>課程查詢系統 PRO</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #f2f2f7; -webkit-tap-highlight-color: transparent; }
        .ios-card { background: white; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
        .font-rounded { font-family: ui-rounded, system-ui, -apple-system, sans-serif; }
        /* 優化 Course Code 讀取度：增加字距，稍微減輕粗度 */
        .course-code { 
            font-family: 'Courier New', Courier, monospace; 
            letter-spacing: 0.05em; 
            font-weight: 800;
        }
        select { -webkit-appearance: none; appearance: none; cursor: pointer; }
        @media (min-width: 768px) {
            .course-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-4xl mx-auto p-4 md:p-10 pb-24">
        
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black tracking-tight">課程查詢系統</h1>
            <button @click="resetAll" class="hidden md:flex items-center gap-2 px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl text-xs font-bold transition-all">
                <i class="fa-solid fa-arrow-rotate-left"></i> 重設全部
            </button>
        </div>

        <div class="ios-card p-6 mb-8 border border-white relative">
            <div class="flex bg-gray-200 p-1 rounded-2xl mb-8 max-w-sm mx-auto">
                <button v-for="l in levels" @click="selectedLevel = l; resetSession()" 
                    :class="selectedLevel === l ? 'bg-white shadow-md text-black' : 'text-gray-500'"
                    class="flex-1 py-2 rounded-xl text-sm font-bold transition-all">
                    {{ l }}
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="flex justify-between items-end gap-6">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                            <i class="fa-solid fa-language text-blue-500 text-xs"></i> 語言
                        </div>
                        <select v-model="selectedLanguage" class="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                            <option v-for="opt in languages">{{ opt }}</option>
                        </select>
                    </div>

                    <div class="w-40">
                        <div class="flex items-center justify-end gap-2 text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                            第幾堂 <i class="fa-solid fa-hashtag text-orange-500 text-xs"></i>
                        </div>
                        <select v-model="targetSession" class="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold border-2 border-transparent focus:border-blue-500 outline-none text-right transition-all shadow-inner">
                            <option v-for="n in sessionRange" :value="n">第 {{ n }} 堂</option>
                        </select>
                    </div>
                </div>

                <div class="relative">
                    <div class="flex items-center justify-center gap-2 text-[10px] font-black text-gray-400 mb-2 uppercase tracking-widest">
                        <i class="fa-solid fa-layer-group text-purple-500 text-xs"></i> 課程模式
                    </div>
                    <select v-model="selectedType" class="w-full p-4 bg-gray-50 rounded-2xl text-sm font-bold text-center border-2 border-transparent focus:border-blue-500 outline-none transition-all shadow-inner">
                        <option v-for="type in courseTypes">{{ type }}</option>
                    </select>
                    <div class="absolute right-6 top-[70%] -translate-y-1/2 pointer-events-none text-gray-300">
                        <i class="fa-solid fa-chevron-down text-[10px]"></i>
                    </div>
                </div>
            </div>
        </div>

        <div v-if="filteredCourses.length > 0" class="course-grid">
            <div v-for="course in filteredCourses" 
                 @click="copyCourse(course)"
                 class="ios-card p-6 mb-4 md:mb-0 hover:shadow-xl active:scale-[0.98] transition-all cursor-pointer border border-transparent hover:border-blue-200 group">
                
                <div class="flex justify-between items-center mb-5">
                    <span class="course-code text-blue-600 text-base">{{ course.code }}</span>
                    <span :class="getTypeStyle(course.type)" class="text-[9px] px-2.5 py-1 rounded-lg font-black uppercase tracking-tighter">
                        {{ course.type }}
                    </span>
                </div>

                <div class="flex justify-between items-end">
                    <div>
                        <div class="text-2xl font-black font-rounded tracking-tight" :class="isToday(course.currentSession.date) ? 'text-red-500' : 'text-gray-800'">
                            {{ course.currentSession.date }}
                        </div>
                        <div class="text-[11px] text-gray-400 font-bold mt-1 tracking-wide uppercase italic">{{ course.language }}</div>
                    </div>
                    <div class="text-right">
                        <div v-if="isToday(course.currentSession.date)" class="text-[9px] font-black text-red-500 mb-1 animate-bounce">TODAY</div>
                        <div class="text-xl font-black font-rounded" :class="isToday(course.currentSession.date) ? 'text-red-500' : 'text-gray-700'">
                            {{ course.currentSession.time }}
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div v-else class="text-center py-32">
            <div class="bg-gray-100 w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-6 rotate-12">
                <i class="fa-solid fa-calendar-xmark text-gray-300 text-2xl"></i>
            </div>
            <p class="text-gray-400 font-bold text-sm">沒有符合條件的課程</p>
            <button @click="resetAll" class="mt-4 text-blue-500 font-bold text-xs hover:underline">RESET ALL</button>
        </div>

        <button @click="resetAll" class="md:hidden fixed bottom-8 right-8 bg-black text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-50">
            <i class="fa-solid fa-arrow-rotate-left"></i>
        </button>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;
        createApp({
            setup() {
                const allCourses = ref([]);
                const selectedLevel = ref('Level 2');
                const selectedLanguage = ref('All');
                const selectedType = ref('All');
                const targetSession = ref(1);

                const levels = ['Level 2', 'Level 3'];
                const languages = ['All', 'English', 'Mandarin', 'Cantonese'];
                const courseTypes = ['All', 'Weekday Evening', 'Weekend Intensive', 'Weekday daytime', 'Consecutive'];

                const sessionRange = computed(() => {
                    const max = selectedLevel.value === 'Level 2' ? 8 : 18;
                    return Array.from({length: max}, (_, i) => i + 1);
                });

                const loadData = async () => {
                    try {
                        const res = await fetch('courses.csv');
                        const text = await res.text();
                        const rows = text.split('\n').filter(r => r.trim() !== '').slice(1);
                        allCourses.value = rows.map(row => {
                            const cols = row.split(',').map(c => c.trim());
                            const sessions = [];
                            for (let i = 4; i < cols.length; i += 2) {
                                if (cols[i]) sessions.push({ num: sessions.length + 1, date: cols[i], time: cols[i+1] });
                            }
                            return { code: cols[0], type: cols[1], language: cols[2], level: cols[3], sessions };
                        });
                    } catch (e) { console.error("CSV Error"); }
                };

                const parseDate = (dateStr) => {
                    const parts = dateStr.split('/');
                    if (parts.length !== 3) return new Date(8640000000000000); 
                    const [d, m, y] = parts.map(Number);
                    return new Date(y, m - 1, d);
                };

                const filteredCourses = computed(() => {
                    const today = new Date();
                    today.setHours(0,0,0,0);

                    let filtered = allCourses.value.filter(c => {
                        const s = c.sessions.find(s => s.num === targetSession.value);
                        if (!s) return false;
                        const sDate = parseDate(s.date);
                        return c.level === selectedLevel.value &&
                               (selectedLanguage.value === 'All' || c.language === selectedLanguage.value) &&
                               (selectedType.value === 'All' || c.type === selectedType.value) &&
                               sDate >= today;
                    }).map(c => ({
                        ...c,
                        currentSession: c.sessions.find(s => s.num === targetSession.value)
                    }));

                    return filtered.sort((a, b) => parseDate(a.currentSession.date) - parseDate(b.currentSession.date));
                });

                const getTypeStyle = (type) => {
                    const styles = {
                        'Weekday Evening': 'bg-blue-50 text-blue-600 border border-blue-100',
                        'Weekend Intensive': 'bg-orange-50 text-orange-600 border border-orange-100',
                        'Weekday daytime': 'bg-green-50 text-green-600 border border-green-100',
                        'Consecutive': 'bg-purple-50 text-purple-600 border border-purple-100'
                    };
                    return styles[type] || 'bg-gray-50 text-gray-500 border border-gray-100';
                };

                const isToday = (dateStr) => {
                    const now = new Date();
                    const d = now.getDate();
                    const m = now.getMonth() + 1;
                    const y = now.getFullYear();
                    return dateStr === `${d}/${m}/${y}`;
                };

                const copyCourse = (c) => {
                    const text = `【課程】${c.code}\n模式：${c.type}\n語言：${c.language}\n日期：${c.currentSession.date} (${c.currentSession.time})`;
                    navigator.clipboard.writeText(text);
                    // 簡約提示
                    const btn = document.createElement('div');
                    btn.innerText = "COPIED!";
                    btn.className = "fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-black text-white px-6 py-3 rounded-2xl font-bold z-[100] shadow-2xl";
                    document.body.appendChild(btn);
                    setTimeout(() => btn.remove(), 1000);
                };

                const resetAll = () => {
                    selectedLanguage.value = 'All';
                    selectedType.value = 'All';
                    targetSession.value = 1;
                };

                const resetSession = () => { targetSession.value = 1; };

                onMounted(loadData);

                return { levels, selectedLevel, languages, selectedLanguage, courseTypes, selectedType, targetSession, sessionRange, filteredCourses, getTypeStyle, isToday, copyCourse, resetAll, resetSession };
            }
        }).mount('#app');
    </script>
</body>
</html>
